# =============================================================
#  .github/workflows/build.yml
#
#  This is the GitHub Actions workflow. Every time you push
#  (save) changes to GitHub, this automatically:
#    1. Downloads ZMK firmware source code
#    2. Compiles your keyboard config into a .uf2 file
#    3. Uploads that .uf2 as a downloadable "artifact"
#
#  You never need to install any compilers on your own computer!
# =============================================================

name: Build ZMK Firmware          # Name shown in GitHub's Actions tab

on:
  push:                            # Trigger: run whenever you push to GitHub
  pull_request:                    # Also run on pull requests
  workflow_dispatch:               # Also lets you click "Run workflow" manually

jobs:
  build:
    runs-on: ubuntu-latest         # GitHub provides a free Linux machine to build on

    steps:
      # ── Step 1: Download YOUR config files ─────────────────
      - name: Checkout config repo
        uses: actions/checkout@v4
        with:
          path: zmk-config         # Puts your files in a folder called zmk-config

      # ── Step 2: Download ZMK firmware source code ──────────
      - name: Checkout ZMK source
        uses: actions/checkout@v4
        with:
          repository: zmkfirmware/zmk   # Official ZMK repo
          ref: main                      # Use the main/latest branch
          path: zmk                      # Save it in a folder called zmk
          fetch-depth: 0

      # ── Step 3: Install the Zephyr / nRF SDK toolchain ─────
      # This is the compiler that turns your config into firmware.
      # GitHub caches this so it's fast after the first run.
      - name: Install Zephyr SDK and dependencies
        uses: zephyrproject-rtos/action-zephyr-setup@v1
        with:
          app-path: zmk
          manifest-file-name: app/west.yml
          sdk-version: 0.16.8       # Pinned version = stable, reproducible builds
          toolchains: arm-zephyr-eabi

      # ── Step 4: Copy your shield into ZMK's source tree ────
      - name: Copy shield files into ZMK
        run: |
          cp -r zmk-config/config/boards/shields/my_keyboard \
                zmk/app/boards/shields/my_keyboard

      # ── Step 5: Actually compile the firmware ───────────────
      # board=nice_nano_v2   → targets the Nice!Nano V2 hardware
      # shield=my_keyboard   → uses your custom shield config
      - name: Build firmware
        working-directory: zmk/app
        run: |
          west build \
            --pristine \
            -b nice_nano_v2 \
            -- -DSHIELD=my_keyboard \
               -DZMK_CONFIG="${GITHUB_WORKSPACE}/zmk-config/config"

      # ── Step 6: Upload the finished .uf2 file ──────────────
      # After the build, go to Actions → your run → scroll down
      # to "Artifacts" and download "my_keyboard_firmware.zip"
      # Inside is the .uf2 file you flash onto the Nice!Nano V2.
      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: my_keyboard_firmware
          path: zmk/app/build/zephyr/zmk.uf2
          if-no-files-found: error   # Fail loudly if build didn't produce a file
